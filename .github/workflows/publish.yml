name: publish to npm

on:
  release:
    types: [published]
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
  workflow_dispatch:
  workflow_run:
    workflows: [bump version]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false
          version: latest
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 'latest'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm i
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: pnpm build
      - run: pnpm publish --no-git-checks
